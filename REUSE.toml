version = 1
SPDX-PackageName = "FreeHSM C"
SPDX-PackageSupplier = "Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/afchine1337/freehsm-c"

# -----------------------------------------------------------------------------
# Bulk declarations for files that cannot carry an SPDX header in their body.
# Each [[annotations]] block applies the SPDX-FileCopyrightText and
# SPDX-License-Identifier to every path matching the glob.
# -----------------------------------------------------------------------------

[[annotations]]
path = [
    "CHANGELOG.md",
    "README.md",
    "README.en.md",
    "NOTICE",
    "SECURITY.md",
    "CONTRIBUTING.md",
    "CODE_OF_CONDUCT.md",
    "RELEASE_v1.1.0.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "docs/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = ["kat/**", "tests/cavp/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "NIST CAVP — Public Domain"
SPDX-License-Identifier = "LicenseRef-NIST-PD"
SPDX-FileComment = "NIST CAVP test vectors are works of the United States Government and are in the public domain."

[[annotations]]
path = [".gitignore", ".gitattributes", "REUSE.toml"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = [
    "**/*.json",
    "**/*.yaml",
    "**/*.yml",
    "**/*.toml",
    "afchine-pubkey.asc",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

# Build tooling : Makefile, Dockerfile, etc.
[[annotations]]
path = [
    "Makefile",
    "Dockerfile.build",
    "Dockerfile.test",
    "**/*.mk",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

# Shell scripts (cannot carry inline SPDX header reliably without
# disturbing shebang on every platform).
[[annotations]]
path = [
    "scripts/**/*.sh",
    "tests/**/*.sh",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

# Python helper scripts.
[[annotations]]
path = [
    "scripts/**/*.py",
    "tests/**/*.py",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"

# Generated sources — produced by scripts/gen_p11_thunks.py.
[[annotations]]
path = [
    "include/fhsm_pkcs11_mechanisms.h",
    "src/gen/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Afchine Madjlessi <afchine.mad@gmail.com>"
SPDX-License-Identifier = "Apache-2.0"
SPDX-FileComment = "Auto-generated from scripts/gen_p11_thunks.py + the mechanism DB."

