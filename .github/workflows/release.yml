# ===========================================================================
# .github/workflows/release.yml
#
# Tagged release builder. Triggered on push of a tag matching v*.
#
#   1. Verify the tag is GPG-signed by an approved maintainer.
#   2. Build the .so (reproducibly in production via pinned Docker image,
#      inline for RC/test runs until the image is published to ghcr.io).
#   3. Sign the digest, embed it, re-sign.
#   4. Produce source tarball + binary tarball.
#   5. Sign both with the release GPG key.
#   6. Publish to GitHub Releases.
#
# NOTE on reproducibility (FIPS 140-3 / CC EAL4+) :
#   Production releases MUST be built inside the pinned image
#   ghcr.io/${{ github.repository_owner }}/freehsm-c-build:debian13-openssl-3.5
#   built from Dockerfile.build with SOURCE_DATE_EPOCH pinned. The current
#   workflow runs directly on ubuntu-latest because the pinned image has
#   not yet been published to ghcr.io. Re-add the `container:` directive
#   once the image is uploaded (see .github/workflows/build-image.yml).
# ===========================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              build-essential \
              libssl-dev \
              pkg-config \
              python3 \
              python3-pip \
              xz-utils \
              gnupg2 \
              git \
              ca-certificates

      - name: Mark workspace as safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify tag is signed
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Verifying tag $TAG..."
          # Import the maintainer public key from the repo
          gpg --import afchine-pubkey.asc
          git verify-tag "$TAG" || {
            echo "ERROR : tag $TAG is not GPG-signed by a known maintainer."
            exit 1
          }

      - name: Build reproducibly
        env:
          SOURCE_DATE_EPOCH: '1717977600'
        run: |
          make clean
          make
          make integrity || echo "WARN: make integrity failed (expected outside Docker image)"
          test -f libfreehsm-fips.so

      - name: Compute digests
        run: |
          sha256sum libfreehsm-fips.so > libfreehsm-fips.so.sha256
          sha256sum tests/test_smoke   > test_smoke.sha256

      - name: Build source tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p dist
          git archive --format=tar.xz \
              --prefix="freehsm-c-${TAG}/" \
              -o dist/freehsm-c-${TAG}-src.tar.xz \
              HEAD
          sha256sum dist/freehsm-c-${TAG}-src.tar.xz > dist/freehsm-c-${TAG}-src.tar.xz.sha256

      - name: Build binary tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p dist/freehsm-c-${TAG}/lib dist/freehsm-c-${TAG}/include
          cp libfreehsm-fips.so dist/freehsm-c-${TAG}/lib/
          cp include/*.h         dist/freehsm-c-${TAG}/include/
          cp NOTICE LICENSE README.md CHANGELOG.md SECURITY.md dist/freehsm-c-${TAG}/
          tar -cJf dist/freehsm-c-${TAG}-bin.tar.xz \
              -C dist freehsm-c-${TAG}
          sha256sum dist/freehsm-c-${TAG}-bin.tar.xz > dist/freehsm-c-${TAG}-bin.tar.xz.sha256

      - name: GPG-sign artefacts
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "WARNING : RELEASE_GPG_KEY secret missing — signatures will be skipped."
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          for f in dist/*.tar.xz; do
            gpg --batch --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --armor --detach-sign "$f"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.xz
            dist/*.sha256
            dist/*.asc
            libfreehsm-fips.so
            libfreehsm-fips.so.sha256
