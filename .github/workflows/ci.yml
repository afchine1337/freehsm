# ===========================================================================
# .github/workflows/ci.yml
#
# Continuous integration for FreeHSM C.
#
#   - lint       : SPDX header presence on every .c/.h
#   - build      : Debian 13 image with OpenSSL 3.5 FIPS provider
#   - test-smoke : the built-in static smoke test
#   - test-cov   : full PKCS#11 coverage matrix (27 PASS / 5 SKIP target)
#   - repro      : two-build reproducibility check
#
# Triggered on every push to main, every PR targeting main, and weekly
# (security-scan freshness).
# ===========================================================================

name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: bash scripts/add_copyright_header.sh --check
      - name: Verify LICENSE + NOTICE present
        run: |
          test -f LICENSE
          test -f NOTICE
          grep -q "Afchine Madjlessi" NOTICE

      # PKCS#11 constant audit (#125). GATING, unlike the pkcs11-check harness
      # run: a behavioural finding is a judgement call, but a constant whose
      # value belongs to a different name is unambiguously a bug -- callers get
      # a different algorithm or error than they asked for. Three such bugs
      # shipped undetected (CKA_PARAMETER_SET on CKA_MODIFIABLE's code point,
      # AES-CMAC advertised as CKM_AES_XCBC_MAC, and a wrap CKR family that each
      # decoded to another error); each surfaced only when a test happened to
      # trip over it. This closes the class.
      - name: PKCS#11 constant audit
        run: |
          python3 -m venv /tmp/p11spec
          /tmp/p11spec/bin/pip install --quiet pkcs11-check
          # Locate types_std.py without importing it: the module uses
          # `from typing import Self` (3.11+) and importing it would tie this
          # step to the runner's Python version. We only need to read the file.
          SPEC=$(/tmp/p11spec/bin/python -c \
            'import os, pkcs11_check as p; print(os.path.join(os.path.dirname(p.__file__), "raw", "types_std.py"))')
          test -f "$SPEC" || { echo "spec table not found at $SPEC"; exit 1; }
          python3 scripts/audit_constants.py --spec "$SPEC"

  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/freehsm-c-build:debian13-openssl-3.5
      options: --user root
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build (default profile = legacy)
        run: |
          make clean
          make 2>&1 | tee build.log
          test -f libfreehsm-fips.so

      - name: Sign module digest
        run: |
          make integrity 2>&1 | tee integrity.log
          ls -la libfreehsm-fips.so

      # The integrity self-check is the one mechanism that must be exercised
      # WITHOUT FHSM_INTEGRITY_ALLOW_UNSIGNED -- every other job sets it, which
      # is why the check shipped inert twice (#125). Gating.
      - name: Integrity self-check (no bypass)
        run: make test-integrity

      - name: Smoke test (smoke + KAT report)
        run: |
          install -m 755 tests/test_smoke /tmp/smoke
          /tmp/smoke 2>&1 | head -30

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: libfreehsm-fips-so
          path: |
            libfreehsm-fips.so
            build.log
            integrity.log
          retention-days: 14

  test-coverage-matrix:
    runs-on: ubuntu-latest
    needs: build
    # The freehsm-c-test image is now published on ghcr.io (since
    # commit "ci: publish freehsm-c-test Docker image for matrix jobs").
    # If the image ever becomes unavailable, gate this job off again
    # with `if: false` while keeping the rest of the CI green.
    container:
      image: ghcr.io/${{ github.repository_owner }}/freehsm-c-test:debian13-pkcs11-tools
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: libfreehsm-fips-so
      - name: Install module
        run: |
          mkdir -p /opt/freehsm/lib
          install -m 755 libfreehsm-fips.so /opt/freehsm/lib/
          useradd -r -d /var/lib/freehsm -m freehsm || true
          chown -R freehsm: /var/lib/freehsm
      - name: Run coverage matrix
        run: |
          bash tests/coverage_matrix.sh 2>&1 | tee matrix.log
          tail -1 matrix.log | grep -q "ALL ASSERTIONS PASS"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-matrix-report
          path: |
            matrix.log
            /tmp/freehsm-coverage.tsv
          retention-days: 14

  test-fips-mode:
    runs-on: ubuntu-latest
    needs: build
    # Image now published on ghcr.io ; symmetric with the
    # test-coverage-matrix job. Gate off again if the image
    # disappears or becomes unavailable.
    container:
      image: ghcr.io/${{ github.repository_owner }}/freehsm-c-test:debian13-pkcs11-tools
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: libfreehsm-fips-so
      - name: Run in FIPS strict mode
        env:
          FHSM_MODE: fips
        run: |
          install -m 755 libfreehsm-fips.so /opt/freehsm/lib/
          bash tests/coverage_matrix.sh 2>&1 | tee matrix-fips.log
          tail -1 matrix-fips.log | grep -q "ALL ASSERTIONS PASS"

  reproducibility:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/${{ github.repository_owner }}/freehsm-c-build:debian13-openssl-3.5
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Build 2
        env:
          SOURCE_DATE_EPOCH: '1717977600'
        run: |
          make clean
          make
          # build1 (uploaded by the `build` job) is the SIGNED module:
          # `make integrity` embeds the SHA-256 self-digest into the
          # .fhsm_digest section. Sign build2 identically so the check is
          # signed-vs-signed. Without this, the two builds differ by
          # exactly the 32-byte digest section and reproducibility always
          # fails -- not a determinism defect but an apples-to-oranges
          # comparison. Signing is itself deterministic (the digest is a
          # function of the reproducible pre-image), so signed builds are
          # bit-identical across independent runs.
          make integrity
          sha256sum libfreehsm-fips.so > /tmp/build2.sha256
      - uses: actions/download-artifact@v4
        with:
          name: libfreehsm-fips-so
          path: /tmp/build1/
      - name: Compare
        # Explicit bash because the default container shell (dash on
        # Debian 13) does not understand process substitution (<(...)).
        shell: bash
        run: |
          sha256sum /tmp/build1/libfreehsm-fips.so > /tmp/build1.sha256
          cat /tmp/build1.sha256 /tmp/build2.sha256
          h1=$(awk '{print $1}' /tmp/build1.sha256)
          h2=$(awk '{print $1}' /tmp/build2.sha256)
          if [ "$h1" != "$h2" ]; then
              echo "ERROR: reproducibility check FAILED" >&2
              echo "  build1 : $h1" >&2
              echo "  build2 : $h2" >&2
              exit 1
          fi
          echo "OK : libfreehsm-fips.so is bit-identical across builds ($h1)"
